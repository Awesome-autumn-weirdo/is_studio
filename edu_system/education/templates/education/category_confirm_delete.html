{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>{{ title }}</h1>
    
    <div class="delete-confirmation">
        <p>Вы уверены, что хотите удалить категорию <strong>"{{ category.name }}"</strong>?</p>
        <p class="warning">Все курсы в этой категории останутся, но будут без категории!</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'categories' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}

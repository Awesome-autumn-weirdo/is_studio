{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>{{ title }}</h1>
    
    <div class="delete-confirmation">
        <p>Вы уверены, что хотите удалить курс <strong>"{{ course.title }}"</strong>?</p>
        <p class="warning">Это действие нельзя будет отменить!</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'course-detail-slug' course.slug %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
